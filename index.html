html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DZ Souk Application</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to DZ Souk</h1>
    </header>
    <main>
        <section id="products">
            <!-- Product listing will be dynamically populated here -->
        </section>
    </main>
    <footer>
        <p>&copy; 2026 DZ Souk</p>
    </footer>

    <!-- Modals -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Product Details</h2>
            <div id="modal-body">
                <!-- Product details will be populated here -->
            </div>
        </div>
    </div>

    <script>
        // JavaScript functions for handling modals and product interactions
        const modal = document.getElementById('productModal');
        const closeModal = document.getElementsByClassName('close-btn')[0];

        closeModal.onclick = function() {
            modal.style.display = 'none';
        };

        // Function to open modal
        function openModal(product) {
            // Populate the modal with product data
            document.getElementById('modal-body').innerHTML = `<p>${product.name}</p><p>${product.description}</p>`;
            modal.style.display = 'block';
        }
    </script>
</body>
</html>
